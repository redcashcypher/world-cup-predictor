<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- icon-stadium: used in Match Ledger / Match Cards for venue -->
    <symbol id="icon-stadium" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <ellipse cx="12" cy="12" rx="10" ry="6" />
      <ellipse cx="12" cy="12" rx="5.5" ry="3.2" />
      <path d="M2 12c0 3.3 4.5 6 10 6s10-2.7 10-6" stroke-dasharray="1 2" />
      <path d="M6 8.5V6M18 8.5V6M4 12h1M19 12h1" />
    </symbol>

    <!-- icon-shirt: used in Golden Boot Race rows -->
    <symbol id="icon-shirt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 3 4 6l1.5 2.5L8 7v13h8V7l2.5 1.5L20 6l-4-3-2 2h-4L8 3Z" stroke-linejoin="round" />
    </symbol>

    <!-- icon-fifa: used in header branding / empty states -->
    <symbol id="icon-fifa" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="9" />
      <path d="M12 3v18M3 12h18M6 6l12 12M18 6 6 18" stroke-dasharray="1 3" />
    </symbol>

    <!-- icon-football-cyber: decorative accent for active match nodes / data ingestion -->
    <symbol id="icon-football-cyber" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <polygon points="12,3 19,8 16,17 8,17 5,8" stroke-linejoin="round" />
      <path d="M12 3v5l-4 3M12 8l4 3-1.5 6M12 8 8 11l1.5 6" />
      <circle cx="12" cy="8" r="1" fill="currentColor" stroke="none" />
    </symbol>
  </defs>
</svg>
